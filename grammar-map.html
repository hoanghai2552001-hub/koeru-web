function GrammarMap(){
  const [selectedId,setSelectedId]=useState(null);
  const [levelFilter,setLevelFilter]=useState(['N5','N4','N3']);
  const [favorites,setFavorites]=useState(()=>ls('koeru.gm.fav',[]));
  const [learned,setLearned]=useState(()=>ls('koeru.gm.learned',[]));
  const [recent,setRecent]=useState(()=>ls('koeru.gm.recent',[]));
  const [search,setSearch]=useState('');
  const [pan,setPan]=useState({x:0,y:0});
  const [zoom,setZoom]=useState(1);
  const [hoveredId,setHoveredId]=useState(null);
  const [copiedLink,setCopiedLink]=useState(false);
  const [isMobile,setIsMobile]=useState(window.innerWidth<820);
  const [isFullscreen,setIsFullscreen]=useState(false);
  const [nodeScale,setNodeScale]=useState(()=>{try{return parseFloat(localStorage.getItem('koeru.gm.nodeScale'))||1}catch(e){return 1}});
  const [theme,setTheme]=useState(()=>ls('koeru.gm.theme','dark'));
  const [texture,setTexture]=useState(()=>ls('koeru.gm.texture','none'));
  const [showThemeMenu,setShowThemeMenu]=useState(false);
  const T=THEMES[theme]||THEMES.dark;
  const toggleTheme=useCallback(()=>{const nt=theme==='dark'?'light':'dark';setTheme(nt);ss('koeru.gm.theme',nt);},[theme]);
  const cycleTexture=useCallback(()=>{const txs=['none','dots','grid','paper'];const i=txs.indexOf(texture);const nt=txs[(i+1)%txs.length];setTexture(nt);ss('koeru.gm.texture',nt);},[texture]);
  const [customPos,setCustomPos]=useState(()=>ls('koeru.gm.customPos',{}));
  const [draggingNode,setDraggingNode]=useState(null);
  const panRef=useRef({isPanning:false,start:null,dragMoved:false});
  const dragRef=useRef(null);
  const cvRef=useRef(null);

  const getNodePos=useCallback((g)=>customPos[g.id]?{x:customPos[g.id].x,y:customPos[g.id].y}:{x:g.x,y:g.y},[customPos]);
  const resetPositions=useCallback(()=>{setCustomPos({});try{localStorage.removeItem('koeru.gm.customPos')}catch(e){}},[]);

  const toggleFullscreen=useCallback(()=>{
    if(!document.fullscreenElement){document.documentElement.requestFullscreen().then(()=>setIsFullscreen(true)).catch(()=>{})}
    else{document.exitFullscreen().then(()=>setIsFullscreen(false)).catch(()=>{})}
  },[]);
  useEffect(()=>{const h=()=>setIsFullscreen(!!document.fullscreenElement);document.addEventListener('fullscreenchange',h);return()=>document.removeEventListener('fullscreenchange',h)},[]);
  const cycleNodeScale=useCallback(()=>{const scales=[0.85,1,1.2];const i=scales.indexOf(nodeScale);const next=scales[(i+1)%scales.length];setNodeScale(next);try{localStorage.setItem('koeru.gm.nodeScale',String(next))}catch(e){}},[nodeScale]);

  const vg=useMemo(()=>G.filter(g=>levelFilter.includes(g.lv)),[levelFilter]);

  const selectNode=useCallback((id)=>{
    setSelectedId(prev=>{
      const ns=prev===id?null:id;
      if(ns){const rec=[ns,...recent.filter(r=>r!==ns)].slice(0,8);setRecent(rec);ss('koeru.gm.recent',rec);}
      return ns;
    });
  },[recent]);

  const nav=useCallback((dir)=>{
    setSelectedId(prev=>{
      if(!prev){if(vg.length)return vg[0].id;return null;}
      const i=vg.findIndex(g=>g.id===prev);
      const ni=i+dir;
      if(ni>=0&&ni<vg.length){
        const nid=vg[ni].id;
        const rec=[nid,...recent.filter(r=>r!==nid)].slice(0,8);setRecent(rec);ss('koeru.gm.recent',rec);
        return nid;
      }
      return prev;
    });
  },[vg,recent]);

  const toggleFav=useCallback(id=>{
    setFavorites(f=>{const nf=f.includes(id)?f.filter(x=>x!==id):[...f,id];ss('koeru.gm.fav',nf);return nf;});
  },[]);
  const toggleLearned=useCallback(id=>{
    setLearned(l=>{const nl=l.includes(id)?l.filter(x=>x!==id):[...l,id];ss('koeru.gm.learned',nl);return nl;});
  },[]);

  const fitView=useCallback(()=>{
    const el=cvRef.current;if(!el)return;
    const {width:W,height:H}=el.getBoundingClientRect();
    const s=Math.min((W||800)/870,(H||600)/800)*0.88;
    setPan({x:(W||800)/2-750*s,y:(H||600)/2-475*s});setZoom(s);
  },[]);

  useEffect(()=>{
    const kh=ev=>{
      if(ev.key==='Escape')setSelectedId(null);
      if(ev.key==='ArrowRight'||ev.key==='ArrowDown')nav(1);
      if(ev.key==='ArrowLeft'||ev.key==='ArrowUp')nav(-1);
    };
    const rh=()=>setIsMobile(window.innerWidth<820);
    window.addEventListener('keydown',kh);window.addEventListener('resize',rh);
    const wmm=ev=>{if(dragRef.current)onMM(ev);};
    const wmu=ev=>{if(dragRef.current)onMU(ev);};
    window.addEventListener('mousemove',wmm);window.addEventListener('mouseup',wmu);
    setTimeout(fitView,150);
    const sk=document.getElementById('gm-loading');if(sk)sk.style.display='none';
    return ()=>{window.removeEventListener('keydown',kh);window.removeEventListener('resize',rh);window.removeEventListener('mousemove',wmm);window.removeEventListener('mouseup',wmu);};
  },[nav,fitView]);

  const toggleLevel=l=>{const f=levelFilter;if(f.includes(l)&&f.length===1)return;setLevelFilter(f.includes(l)?f.filter(x=>x!==l):[...f,l]);};

  // Search
  const searchResults=useMemo(()=>{
    const q=search.trim().toLowerCase();if(!q)return [];
    return G.filter(g=>levelFilter.includes(g.lv)&&(
      g.p.toLowerCase().includes(q)||g.ro.toLowerCase().includes(q)||
      g.sv.toLowerCase().includes(q)||g.r.toLowerCase().includes(q)||
      (g.tg||[]).some(t=>t.toLowerCase().includes(q))
    ));
  },[search,levelFilter]);

  // Canvas handlers
  const onWheel=useCallback(ev=>{
    ev.preventDefault();
    const rect=ev.currentTarget.getBoundingClientRect();
    const mx=ev.clientX-rect.left,my=ev.clientY-rect.top;
    setZoom(z=>{setPan(p=>{const factor=ev.deltaY>0?0.88:1.14;const nz=Math.max(.25,Math.min(3,z*factor));return {x:mx-(mx-p.x)*(nz/z),y:my-(my-p.y)*(nz/z)};});return Math.max(.25,Math.min(3,z*(ev.deltaY>0?0.88:1.14)));});
  },[]);

  const onMD=useCallback(ev=>{if(ev.button!==0)return;panRef.current={isPanning:true,start:{mx:ev.clientX,my:ev.clientY,px:pan.x,py:pan.y},dragMoved:false};},[pan]);
  const onMM=useCallback(ev=>{
    if(dragRef.current){
      const d=dragRef.current;const dx=(ev.clientX-d.startMx)/zoom,dy=(ev.clientY-d.startMy)/zoom;
      if(Math.abs(dx)>2||Math.abs(dy)>2){d.moved=true;setCustomPos(p=>({...p,[d.id]:{x:d.origX+dx,y:d.origY+dy}}));}
      return;
    }
    const p=panRef.current;if(!p.isPanning)return;const {mx,my,px,py}=p.start;const dx=ev.clientX-mx,dy=ev.clientY-my;if(Math.abs(dx)>3||Math.abs(dy)>3){p.dragMoved=true;setPan({x:px+dx,y:py+dy});}
  },[zoom]);
  const onMU=useCallback(()=>{
    if(dragRef.current){
      if(dragRef.current.moved){const cp={...customPos};cp[dragRef.current.id]={x:Math.round(customPos[dragRef.current.id]?.x||dragRef.current.origX),y:Math.round(customPos[dragRef.current.id]?.y||dragRef.current.origY)};ss('koeru.gm.customPos',cp);}
      panRef.current.dragMoved=!!dragRef.current.moved;
      dragRef.current=null;setDraggingNode(null);setTimeout(()=>{panRef.current.dragMoved=false;},50);return;
    }
    panRef.current.isPanning=false;setTimeout(()=>{panRef.current.dragMoved=false;},50);
  },[customPos]);

  const onTS=useCallback(ev=>{
    if(ev.touches.length===1)panRef.current={isPanning:true,start:{mx:ev.touches[0].clientX,my:ev.touches[0].clientY,px:pan.x,py:pan.y},dragMoved:false,pinchDist:null,pinchZoom:zoom};
    else if(ev.touches.length===2){const d=Math.hypot(ev.touches[0].clientX-ev.touches[1].clientX,ev.touches[0].clientY-ev.touches[1].clientY);panRef.current.pinchDist=d;panRef.current.pinchZoom=zoom;}
  },[pan,zoom]);
  const onTM=useCallback(ev=>{
    ev.preventDefault();const p=panRef.current;
    if(ev.touches.length===1&&p.isPanning){const {mx,my,px,py}=p.start;const dx=ev.touches[0].clientX-mx,dy=ev.touches[0].clientY-my;if(Math.abs(dx)>3||Math.abs(dy)>3){p.dragMoved=true;setPan({x:px+dx,y:py+dy});}}
    else if(ev.touches.length===2&&p.pinchDist){const d=Math.hypot(ev.touches[0].clientX-ev.touches[1].clientX,ev.touches[0].clientY-ev.touches[1].clientY);setZoom(Math.max(.25,Math.min(3,p.pinchZoom*(d/p.pinchDist))));}
  },[]);
  const onTE=useCallback(()=>{panRef.current.isPanning=false;panRef.current.pinchDist=null;setTimeout(()=>{panRef.current.dragMoved=false;},50);},[]);

  // SVG rendering
  const vCatIds=new Set(vg.map(g=>g.cat));
  const vC=CATS.filter(c=>vCatIds.has(c.id));

  const n5=levelFilter.includes('N5'),n4=levelFilter.includes('N4'),n3=levelFilter.includes('N3'),allOn=n5&&n4&&n3;
  const bBase={padding:'4px 10px',borderRadius:7,fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit',flexShrink:0};

  return <div style={{display:'flex',flexDirection:'column',height:'100vh',background:T.bg,color:T.text,fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",overflow:'hidden',position:'relative'}}>
    {/* HEADER */}
    <header style={{height:44,flex:'none',background:T.bg2,borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',padding:'0 14px',gap:10,zIndex:20}}>
      <a href="./index.html" style={{display:'flex',alignItems:'center',gap:8,flex:'none',textDecoration:'none',color:'inherit'}}>
        <img src="./koeru-logo.png" alt="KOERU" style={{height:28,width:'auto'}} onError={e=>{e.target.style.display='none'}}/>
        <span style={{color:'rgba(255,255,255,.1)'}}>|</span>
        <span style={{fontSize:12.5,fontWeight:500,color:T.textDim}}>Bản đồ Ngữ pháp</span>
      </a>
      <div style={{flex:1,maxWidth:300,position:'relative',marginLeft:6}}>
        <div style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',color:T.textFaint,fontSize:13,pointerEvents:'none'}}>{'⌕'}</div>
        <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="~ながら · nagara · vừa vừa…"
          style={{width:'100%',background:T.btnBg2,border:`1px solid ${T.border2}`,borderRadius:8,padding:'5px 26px 5px 27px',color:T.text,fontSize:12,outline:'none',fontFamily:'inherit'}}/>
        {search.length>0&&<button onClick={()=>setSearch('')} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'#334155',cursor:'pointer',fontSize:15,padding:0,lineHeight:1}}>{'×'}</button>}
      </div>
      <div style={{display:'flex',gap:5,marginLeft:'auto',alignItems:'center'}}>
        {Object.keys(customPos).length>0&&<button onClick={resetPositions} title="Reset vị trí về mặc định" style={{background:'rgba(239,68,68,.12)',border:'1px solid rgba(239,68,68,.25)',color:'#ef4444',fontSize:11,padding:'4px 8px',borderRadius:6,cursor:'pointer',fontFamily:'inherit'}}>↺ Reset</button>}
        <button onClick={toggleTheme} title={theme==='dark'?'Chuyển sang sáng':'Chuyển sang tối'} style={{background:T.btnBg,border:`1px solid ${T.border2}`,color:T.textDim,fontSize:11,padding:'4px 8px',borderRadius:6,cursor:'pointer',fontFamily:'inherit'}}>{theme==='dark'?'☀':'🌙'}</button>
        <button onClick={cycleTexture} title={`Nền: ${TX_LABELS[texture]}`} style={{background:T.btnBg,border:`1px solid ${T.border2}`,color:T.textDim,fontSize:11,padding:'4px 8px',borderRadius:6,cursor:'pointer',fontFamily:'inherit'}}>{'▦ '+TX_LABELS[texture]}</button>
        <button onClick={cycleNodeScale} title={`Cỡ chữ: ${nodeScale===0.85?'Nhỏ':nodeScale===1?'Vừa':'Lớn'}`} style={{background:T.btnBg,border:`1px solid ${T.border2}`,color:T.textDim,fontSize:11,padding:'4px 8px',borderRadius:6,cursor:'pointer',fontFamily:'inherit'}}>{nodeScale===0.85?'Aa⁻':nodeScale===1?'Aa':'Aa⁺'}</button>
        <button onClick={toggleFullscreen} title={isFullscreen?'Thoát toàn màn hình':'Toàn màn hình'} style={{background:T.btnBg,border:`1px solid ${T.border2}`,color:T.textDim,fontSize:11,padding:'4px 8px',borderRadius:6,cursor:'pointer',fontFamily:'inherit'}}>{isFullscreen?'⊖':'⊕'} Full</button>
        <button onClick={()=>{try{navigator.clipboard.writeText(location.href);}catch(e){}setCopiedLink(true);setTimeout(()=>setCopiedLink(false),1500);}} style={{background:T.btnBg,border:`1px solid ${T.border2}`,color:T.textDim,fontSize:11,padding:'4px 8px',borderRadius:6,cursor:'pointer',fontFamily:'inherit'}}>{copiedLink?'✓ Copied':'🔗 Chia sẻ'}</button>
        {!isMobile&&<a href="./index.html" style={{display:'inline-flex',alignItems:'center',border:`1px solid ${T.border2}`,color:T.textDim,fontSize:11,padding:'4px 8px',borderRadius:6,textDecoration:'none'}}>{'← Trang chủ'}</a>}
      </div>
    </header>

    {/* LEVEL BAR */}
    <div style={{height:40,flex:'none',background:T.bg3,borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',padding:'0 14px',gap:6,zIndex:20,overflowX:'auto'}}>
      <button onClick={()=>setLevelFilter(['N5','N4','N3'])} style={{...bBase,background:allOn?T.btnBg3:T.btnBg,border:`1px solid ${allOn?T.border3:T.border2}`,color:allOn?T.text:T.textDim}}>Tất cả</button>
      <button onClick={()=>toggleLevel('N5')} style={{...bBase,background:n5?'rgba(74,222,128,.15)':T.btnBg,border:`1px solid ${n5?'rgba(74,222,128,.38)':T.border2}`,color:n5?'#4ade80':T.textVDim}}>N5 <span style={{opacity:.65,fontWeight:400}}>{G.filter(g=>g.lv==='N5').length}</span></button>
      <button onClick={()=>toggleLevel('N4')} style={{...bBase,background:n4?'rgba(129,140,248,.15)':T.btnBg,border:`1px solid ${n4?'rgba(129,140,248,.38)':T.border2}`,color:n4?'#818cf8':T.textVDim}}>N4 <span style={{opacity:.65,fontWeight:400}}>{G.filter(g=>g.lv==='N4').length}</span></button>
      <button onClick={()=>toggleLevel('N3')} style={{...bBase,background:n3?'rgba(251,146,60,.15)':T.btnBg,border:`1px solid ${n3?'rgba(251,146,60,.38)':T.border2}`,color:n3?'#fb923c':T.textVDim}}>N3 <span style={{opacity:.65,fontWeight:400}}>{G.filter(g=>g.lv==='N3').length}</span></button>
      <div style={{width:1,height:16,background:T.border2,margin:'0 2px',flex:'none'}}></div>
      <span style={{fontSize:10.5,color:T.textVDim,flex:'none'}}>{vg.length} / {G.length} mẫu</span>
      <div style={{flex:1}}></div>
      <button onClick={fitView} style={{padding:'3px 8px',borderRadius:5,background:T.btnBg,border:`1px solid ${T.border}`,color:T.textVDim,fontSize:10.5,cursor:'pointer',fontFamily:'inherit',flex:'none'}}>{'⊕ Fit'}</button>
      <button onClick={()=>setZoom(z=>Math.min(3,z*1.2))} style={{padding:'3px 8px',borderRadius:5,background:T.btnBg,border:`1px solid ${T.border}`,color:T.textVDim,fontSize:10.5,cursor:'pointer',fontFamily:'inherit',flex:'none'}}>{'＋'}</button>
      <button onClick={()=>setZoom(z=>Math.max(.25,z*.83))} style={{padding:'3px 8px',borderRadius:5,background:T.btnBg,border:`1px solid ${T.border}`,color:T.textVDim,fontSize:10.5,cursor:'pointer',fontFamily:'inherit',flex:'none'}}>{'－'}</button>
    </div>

    {/* SEARCH DROPDOWN */}
    {search.trim().length>0&&searchResults.length>0&&<div style={{position:'absolute',top:84,left:54,width:310,background:T.bg4,border:`1px solid ${T.border3}`,borderRadius:10,overflow:'hidden',zIndex:50,boxShadow:`0 8px 24px ${T.shadowA}`,animation:'slideUp .15s ease',maxHeight:240,overflowY:'auto'}}>
      {searchResults.map(r=><div key={r.id} onClick={()=>{selectNode(r.id);setSearch('');}} style={{padding:'9px 12px',borderBottom:`1px solid ${T.border}`,cursor:'pointer',display:'flex',alignItems:'center',gap:10}}>
        <div style={{fontSize:13,color:T.text,fontFamily:"'Noto Sans JP',sans-serif",flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.r}</div>
        <div style={{flex:'none',display:'flex',flexDirection:'column',alignItems:'flex-end',gap:2}}>
          <div style={{fontSize:10,color:T.textDim,maxWidth:90,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.sv}</div>
          <div style={{fontSize:9.5,fontWeight:700,color:lc(r.lv)}}>{r.lv}</div>
        </div>
      </div>)}
    </div>}
    {search.trim().length>0&&searchResults.length===0&&<div style={{position:'absolute',top:84,left:54,width:310,background:T.bg4,border:`1px solid ${T.border2}`,borderRadius:10,padding:'11px 13px',zIndex:50,fontSize:12,color:T.textFaint}}>Không tìm thấy "{search}"</div>}

    {/* BODY */}
    <div style={{display:'flex',flex:1,overflow:'hidden',minHeight:0}}>
      {/* LEFT SIDEBAR */}
      {!isMobile&&<aside style={{width:228,flex:'none',background:T.bg3,borderRight:`1px solid ${T.border}`,overflowY:'auto',display:'flex',flexDirection:'column'}}>
        <div style={{padding:'12px 12px 10px',borderBottom:`1px solid ${T.border}`}}>
          <div style={{fontSize:9,fontWeight:600,color:T.textVDim,textTransform:'uppercase',letterSpacing:'.7px',marginBottom:8}}>Nhóm chức năng</div>
          <div style={{display:'flex',flexDirection:'column',gap:2}}>
            {CATS.map(cat=><div key={cat.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'5px 7px',borderRadius:6,cursor:'pointer'}}>
              <div style={{display:'flex',alignItems:'center',gap:7}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:cat.c,flexShrink:0}}></div>
                <span style={{fontSize:11.5,color:T.textActive,fontFamily:"'Noto Sans JP',sans-serif"}}>{cat.lb}</span>
                <span style={{fontSize:10,color:T.textFaint}}>{cat.sl}</span>
              </div>
              <span style={{fontSize:10,color:T.textVDim,background:T.btnBg,borderRadius:8,padding:'1px 5px'}}>{G.filter(g=>g.cat===cat.id&&levelFilter.includes(g.lv)).length}</span>
            </div>)}
          </div>
        </div>
        <div style={{padding:'12px 12px',flex:1}}>
          <div style={{display:'flex',gap:6,marginBottom:12}}>
            <div style={{flex:1,background:'rgba(74,222,128,.07)',border:'1px solid rgba(74,222,128,.15)',borderRadius:8,padding:8,textAlign:'center'}}>
              <div style={{fontSize:18,fontWeight:700,color:'#4ade80'}}>{learned.length}</div>
              <div style={{fontSize:9,color:T.textVDim,marginTop:2}}>Đã học</div>
            </div>
            <div style={{flex:1,background:'rgba(251,146,60,.07)',border:'1px solid rgba(251,146,60,.15)',borderRadius:8,padding:8,textAlign:'center'}}>
              <div style={{fontSize:18,fontWeight:700,color:'#fb923c'}}>{favorites.length}</div>
              <div style={{fontSize:9,color:T.textVDim,marginTop:2}}>Yêu thích</div>
            </div>
          </div>
          <div style={{fontSize:9,fontWeight:600,color:T.textVDim,textTransform:'uppercase',letterSpacing:'.7px',marginBottom:6}}>Gần đây</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
            {recent.map(id=>{const g=G.find(x=>x.id===id);if(!g)return null;return <button key={id} onClick={()=>selectNode(id)} style={{padding:'4px 9px',borderRadius:20,border:`1px solid ${lbd(g.lv)}`,background:lb(g.lv),color:lc(g.lv),fontSize:11.5,cursor:'pointer',fontFamily:"'Noto Sans JP',sans-serif",fontWeight:600}}>{g.r}</button>;})}
            {recent.length===0&&<div style={{fontSize:10.5,color:T.textFaint,lineHeight:1.6}}>Click node để bắt đầu</div>}
          </div>
          <div style={{marginTop:14,fontSize:9.5,color:T.textFaint,lineHeight:1.7}}>{'← →'} chuyển · Esc bỏ chọn<br/>Scroll {'→'} zoom · Drag {'→'} pan</div>
        </div>
      </aside>}

      {/* CANVAS */}
      <div ref={cvRef} style={{flex:1,minWidth:0,position:'relative',overflow:'hidden',background:theme==='dark'?'radial-gradient(ellipse at 50% 38%,#0d1825 0%,#080b11 100%)':'radial-gradient(ellipse at 50% 38%,#e8ecf2 0%,#dde1e8 100%)'}}>
        <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',cursor:panRef.current.isPanning?'grabbing':'grab',touchAction:'none'}}
          onMouseDown={onMD} onMouseMove={onMM} onMouseUp={onMU} onMouseLeave={onMU}
          onWheel={onWheel} onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}>
          <defs>
            {texture==='dots'&&TEXTURES.dots(theme)}
            {texture==='grid'&&TEXTURES.grid(theme)}
            {texture==='paper'&&TEXTURES.paper(theme)}
          </defs>
          {texture==='dots'&&<rect width="100%" height="100%" fill="url(#tx-dots)"/>}
          {texture==='grid'&&<rect width="100%" height="100%" fill="url(#tx-grid)"/>}
          {texture==='paper'&&<rect width="100%" height="100%" filter="url(#tx-paper)" opacity=".15"/>}
          <g transform={`translate(${pan.x},${pan.y}) scale(${zoom})`}>
            {/* Root→Cat edges */}
            {vC.map(cat=><line key={'rc-'+cat.id} x1={ROOT.x} y1={ROOT.y} x2={cat.x} y2={cat.y} stroke={theme==='dark'?'rgba(255,255,255,.07)':'rgba(0,0,0,.08)'} strokeWidth="1.5"/>)}
            {/* Cat→Node edges */}
            {vg.map(g=>{const cat=CATS.find(c=>c.id===g.cat);if(!cat)return null;const ec={N5:'rgba(74,222,128,.16)',N4:'rgba(129,140,248,.16)',N3:'rgba(251,146,60,.16)'}[g.lv]||T.border;return <line key={'te-'+g.id} x1={cat.x} y1={cat.y} x2={g.x} y2={g.y} stroke={ec} strokeWidth="1"/>;})}
            {/* Relation edges */}
            {selectedId&&(()=>{const si=G.find(g=>g.id===selectedId);if(!si)return null;return (si.rl||[]).map((rel,i)=>{const tg=vg.find(g=>g.id===rel.id);if(!tg)return null;return <line key={'rl-'+i} x1={si.x} y1={si.y} x2={tg.x} y2={tg.y} stroke={rtc(rel.t)} strokeWidth="1.5" strokeDasharray="5,3.5" opacity=".65"/>;});})()}
            {/* Category nodes */}
            {vC.map(cat=>{const W=104,H=48,R=9;const cnt=G.filter(g=>g.cat===cat.id&&levelFilter.includes(g.lv)).length;const hi=selectedId&&G.find(g=>g.id===selectedId&&g.cat===cat.id);
              return <g key={'cat-'+cat.id} transform={`translate(${cat.x},${cat.y})`}>
                <rect x={-W/2} y={-H/2} width={W} height={H} rx={R} fill={T.catLabelBg} stroke={hi?'#00C2FF':cat.c} strokeWidth={hi?2:1.5} strokeOpacity={hi?1:.5}/>
                <rect x={-W/2+8} y={-H/2} width={W-16} height={2.5} rx={1.2} fill={cat.c} opacity=".7"/>
                <text x="0" y="-5" textAnchor="middle" fontSize="14" fontWeight="700" fill={T.text} fontFamily="'Noto Sans JP',sans-serif">{cat.lb}</text>
                <text x="0" y="11" textAnchor="middle" fontSize="7.5" fill={T.textMid} fontFamily="'Plus Jakarta Sans',sans-serif">{cat.sl}</text>
                {cnt>0&&<g transform={`translate(${W/2-10},${-H/2+2})`}><circle cx="0" cy="0" r="9" fill={cat.c} opacity=".9"/><text x="0" y="0" textAnchor="middle" dominantBaseline="middle" fontSize="8" fontWeight="700" fill="#fff">{cnt}</text></g>}
              </g>;})}
            {/* Grammar nodes */}
            {vg.map(g=>{const sel=selectedId===g.id,hov=hoveredId===g.id;const W=114,H=44,R=8;const _lc=lc(g.lv),_lb=lb(g.lv),_lbd=lbd(g.lv);const ns=nodeScale;const pos=getNodePos(g);const rd=g.r.length>9?g.r.slice(0,8)+'…':g.r;const sv2=g.sv.length>13?g.sv.slice(0,12)+'…':g.sv;
              const nFill=sel?'rgba(26,42,128,.9)':(theme==='light'?T.nodeFill:_lb);
              return <g key={g.id} transform={`translate(${pos.x},${pos.y}) scale(${ns})`} style={{cursor:draggingNode===g.id?'grabbing':'grab'}} onClick={()=>{if(!panRef.current.dragMoved)selectNode(g.id);}} onMouseDown={ev=>{ev.stopPropagation();dragRef.current={id:g.id,startMx:ev.clientX,startMy:ev.clientY,origX:pos.x,origY:pos.y,moved:false};setDraggingNode(g.id);}} onMouseEnter={()=>setHoveredId(g.id)} onMouseLeave={()=>setHoveredId(null)}>
                {sel&&<rect x={-W/2-4} y={-H/2-4} width={W+8} height={H+8} rx={R+4} fill="none" stroke="#00C2FF" strokeWidth="1.5" opacity=".6"/>}
                <rect x={-W/2} y={-H/2} width={W} height={H} rx={R} fill={nFill} stroke={sel?'#00C2FF':(hov?_lc:_lbd)} strokeWidth={(sel||hov)?1.5:1}/>
                <rect x={-W/2} y={-H/2+R} width={3.5} height={H-2*R} rx={1.5} fill={_lc} opacity=".9"/>
                <text x={-W/2+11} y="-4" textAnchor="start" fontSize="12" fontWeight="600" fill={sel?'#fff':T.text} fontFamily="'Noto Sans JP','Plus Jakarta Sans',sans-serif">{rd}</text>
                <text x={-W/2+11} y="12" textAnchor="start" fontSize="9" fill={sel?'rgba(255,255,255,.65)':T.textMid} fontFamily="'Plus Jakarta Sans',sans-serif">{sv2}</text>
                <g transform={`translate(${W/2-16},${-H/2+8})`}><rect x="-12" y="-6" width="24" height="12" rx="6" fill={_lb} stroke={_lbd} strokeWidth=".8"/><text x="0" y="0" textAnchor="middle" dominantBaseline="middle" fontSize="7" fontWeight="700" fill={_lc}>{g.lv}</text></g>
              </g>;})}
            {/* Root node */}
            <g transform={`translate(${ROOT.x},${ROOT.y})`}>
              <circle cx="0" cy="0" r="48" fill="rgba(99,102,241,.1)" stroke="rgba(99,102,241,.22)" strokeWidth="1.5"/>
              <circle cx="0" cy="0" r="38" fill={theme==='dark'?'#1A2A80':'#3B4FCC'} stroke={T.nodeStroke} strokeWidth="1"/>
              <text x="0" y="-5" textAnchor="middle" fontSize="20" fontWeight="700" fill="#fff" fontFamily="'Noto Sans JP',sans-serif">文法</text>
              <text x="0" y="13" textAnchor="middle" fontSize="8" fill="rgba(255,255,255,.6)" fontFamily="'Plus Jakarta Sans',sans-serif">Ngữ pháp N5–N3</text>
            </g>
          </g>
        </svg>
      </div>

      {/* RIGHT DETAIL (desktop) */}
      {!isMobile&&<aside style={{width:334,flex:'none',background:T.bg3,borderLeft:`1px solid ${T.border}`,overflowY:'auto'}}>
        <DetailPanel selectedId={selectedId} onSelect={selectNode} favorites={favorites} learned={learned} onToggleFav={toggleFav} onToggleLearned={toggleLearned} onNav={nav} levelFilter={levelFilter} T={T} theme={theme}/>
      </aside>}
    </div>

    {/* MOBILE BOTTOM SHEET */}
    {isMobile&&selectedId&&<div style={{position:'absolute',bottom:0,left:0,right:0,height:'58vh',background:T.bg3,borderTop:`1px solid ${T.border3}`,borderRadius:'14px 14px 0 0',zIndex:30,display:'flex',flexDirection:'column',overflow:'hidden',boxShadow:`0 -8px 32px ${T.shadowA}`}}>
      <div style={{width:34,height:4,background:T.border3,borderRadius:2,margin:'8px auto 0',flex:'none'}}></div>
      <div style={{flex:1,overflowY:'auto'}}>
        <DetailPanel selectedId={selectedId} onSelect={selectNode} favorites={favorites} learned={learned} onToggleFav={toggleFav} onToggleLearned={toggleLearned} onNav={nav} levelFilter={levelFilter} T={T} theme={theme}/>
      </div>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<GrammarMap/>);
</script>
</body>
</html>
